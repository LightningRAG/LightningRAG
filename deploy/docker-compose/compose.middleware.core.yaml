# 核心中间件：MySQL + Redis（默认随主 compose 启动）
# 由 docker-compose.yaml 通过 include 引入

x-logging: &dev-json-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

volumes:
  mysql:
  redis:

services:
  mysql:
    image: mysql:8.0.39
    container_name: lightningrag-mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
    restart: always
    ports:
      - "${EXPOSE_MYSQL_PORT:-13306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rag@lightningrag}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-qmPlus}"
      MYSQL_USER: "${MYSQL_USER:-lrag}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-rag@lightningrag}"
    healthcheck:
      # 使用 root + 容器内 MYSQL_ROOT_PASSWORD，避免与 MYSQL_USER/MYSQL_PASSWORD 自定义时不一致
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      - mysql:/var/lib/mysql
    networks:
      network:
        ipv4_address: 177.7.0.13
    logging: *dev-json-logging

  redis:
    image: valkey/valkey:8
    container_name: lightningrag-redis
    restart: always
    ports:
      - "${EXPOSE_REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - redis:/data
    networks:
      network:
        ipv4_address: 177.7.0.14
    logging: *dev-json-logging

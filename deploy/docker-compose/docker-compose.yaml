# Docker Compose v2+ 无需 version 字段
# 中间件拆分为 compose.middleware.core.yaml（MySQL/Redis）与 compose.middleware.optional.yaml（MinIO/PG/ES/Mongo）
# 校验：docker compose config ；include 合并后不支持跨文件 YAML 锚点，日志模板在各文件中各自定义。
# 可选栈启用示例：
#   docker compose --profile minio --profile pgsql up -d
#   COMPOSE_PROFILES=minio,pgsql,elasticsearch,mongo docker compose up -d

include:
  - path: compose.middleware.core.yaml
  - path: compose.middleware.optional.yaml

x-logging: &dev-json-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

networks:
  network:
    ipam:
      driver: default
      config:
        - subnet: "177.7.0.0/16"

services:
  web:
    build:
      context: ../../web
      dockerfile: ./Dockerfile
    container_name: lightningrag-web
    restart: always
    ports:
      - "${LRAG_WEB_PORT:-8080}:8080"
    depends_on:
      server:
        condition: service_healthy
    command: ["nginx-debug", "-g", "daemon off;"]
    networks:
      network:
        ipv4_address: 177.7.0.11
    logging: *dev-json-logging

  server:
    build:
      context: ../../server
      dockerfile: ./Dockerfile
    container_name: lightningrag-server
    restart: always
    ports:
      - "${LRAG_SERVER_PORT:-8888}:8888"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8888/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      network:
        ipv4_address: 177.7.0.12
    logging: *dev-json-logging

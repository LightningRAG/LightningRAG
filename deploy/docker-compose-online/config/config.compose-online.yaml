# 与 deploy/docker-compose-online/.env 中 MySQL/Redis/MinIO 默认值保持一致；修改密码时请同步更新本文件
# 由 docker-compose.yaml 挂载覆盖镜像内 config.docker.yaml

jwt:
    signing-key: qmPlus
    expires-time: 7d
    buffer-time: 1d
    issuer: qmPlus
zap:
    level: info
    format: console
    prefix: "[github.com/LightningRAG/LightningRAG/server]"
    director: log
    show-line: true
    encode-level: LowercaseColorLevelEncoder
    stacktrace-key: stacktrace
    log-in-console: true
    retention-day: -1

redis:
    useCluster: false
    addr: redis:6379
    password: ""
    db: 0
    clusterAddrs:
        - "redis:7000"
        - "redis:7001"
        - "redis:7002"

redis-list:
    - name: cache
      useCluster: false
      addr: redis:6379
      password: ""
      db: 0
      clusterAddrs:
          - "redis:7000"
          - "redis:7001"
          - "redis:7002"

mongo:
    coll: ''
    options: ''
    database: ''
    username: ''
    password: ''
    auth-source: ''
    min-pool-size: 0
    max-pool-size: 100
    socket-timeout-ms: 0
    connect-timeout-ms: 0
    is-zap: false
    hosts:
        - host: ''
          port: ''

email:
    to: xxx@qq.com
    port: 465
    from: xxx@163.com
    host: smtp.163.com
    is-ssl: true
    secret: xxx
    nickname: test

system:
    env: local
    addr: 8888
    db-type: mysql
    oss-type: local
    use-redis: false
    use-mongo: false
    use-multipoint: false
    iplimit-count: 15000
    iplimit-time: 3600
    router-prefix: ""
    use-strict-auth: false

captcha:
    key-long: 6
    img-width: 240
    img-height: 80
    open-captcha: 0
    open-captcha-timeout: 3600

mysql:
    path: mysql
    port: "3306"
    config: charset=utf8mb4&parseTime=True&loc=Local
    db-name: qmPlus
    username: lrag
    password: lrag_pass_change_me
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: error
    log-zap: false

pgsql:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
oracle:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
mssql:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
sqlite:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
db-list:
    - disable: true
      type: ""
      alias-name: ""
      path: ""
      port: ""
      config: ""
      db-name: ""
      username: ""
      password: ""
      max-idle-conns: 10
      max-open-conns: 100
      log-mode: ""
      log-zap: false

local:
    path: uploads/file
    store-path: uploads/file

autocode:
    web: web/src
    root: ""
    server: server
    module: 'github.com/LightningRAG/LightningRAG/server'
    ai-path: ""

qiniu:
    zone: ZoneHuaDong
    bucket: ""
    img-path: ""
    use-https: false
    access-key: ""
    secret-key: ""
    use-cdn-domains: false

# 启用 compose profile minio 且 system.oss-type 为 minio 时可使用（需自行创建 bucket）
minio:
    endpoint: minio:9000
    access-key-id: lrag_minio
    access-key-secret: lrag_minio_change_me
    bucket-name: lrag
    use-ssl: false
    base-path: ""
    bucket-url: "http://minio:9000/lrag"

aliyun-oss:
    endpoint: yourEndpoint
    access-key-id: yourAccessKeyId
    access-key-secret: yourAccessKeySecret
    bucket-name: yourBucketName
    bucket-url: yourBucketUrl
    base-path: yourBasePath

tencent-cos:
    bucket: xxxxx-10005608
    region: ap-shanghai
    secret-id: your-secret-id
    secret-key: your-secret-key
    base-url: https://lightningrag.com
    path-prefix: github.com/LightningRAG/LightningRAG/server

aws-s3:
    bucket: xxxxx-10005608
    region: ap-shanghai
    endpoint: ""
    s3-force-path-style: false
    disable-ssl: false
    secret-id: your-secret-id
    secret-key: your-secret-key
    base-url: https://lightningrag.com
    path-prefix: github.com/LightningRAG/LightningRAG/server

cloudflare-r2:
    bucket: xxxx0bucket
    base-url: https://lightningrag.com
    path: uploads
    account-id: xxx_account_id
    access-key-id: xxx_key_id
    secret-access-key: xxx_secret_key

hua-wei-obs:
    path: you-path
    bucket: you-bucket
    endpoint: you-endpoint
    access-key: you-access-key
    secret-key: you-secret-key

excel:
    dir: ./resource/excel/

disk-list:
    - mount-point: "/"

cors:
    mode: strict-whitelist
    whitelist:
        - allow-origin: example1.com
          allow-headers: Content-Type,AccessToken,X-CSRF-Token, Authorization, Token,X-Token,X-User-Id
          allow-methods: POST, GET
          expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type
          allow-credentials: true
        - allow-origin: example2.com
          allow-headers: content-type
          allow-methods: GET, POST
          expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type
          allow-credentials: true
mcp:
    name: LightningRAG_MCP
    version: v1.0.0
    sse_path: /sse
    message_path: /message
    url_prefix: ''
    addr: 8889
    separate: false

# LightningRAG 中间件栈：默认 mysql + redis；其余通过 profile 按需启用
# 用法示例：
#   docker compose --profile minio --profile elasticsearch up -d
# 或在 .env 中设置 COMPOSE_PROFILES=minio,pgsql,elasticsearch,mongo

# Compose 扩展字段：日志 json-file 轮转，避免占满磁盘
x-logging: &lrag-json-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  mysql:
    image: mysql:8.0.39
    container_name: lrag-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
    ports:
      - ${EXPOSE_MYSQL_PORT}:3306
    volumes:
      - lrag_mysql_data:/var/lib/mysql
    networks:
      - lrag
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    logging: *lrag-json-logging

  redis:
    image: valkey/valkey:8
    container_name: lrag-redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec valkey-server --requirepass "$$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru
        else
          exec valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - ${EXPOSE_REDIS_PORT}:6379
    volumes:
      - lrag_redis_data:/data
    networks:
      - lrag
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then valkey-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG; else valkey-cli ping | grep -q PONG; fi
      interval: 10s
      timeout: 5s
      retries: 30
    logging: *lrag-json-logging

  minio:
    profiles:
      - minio
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: lrag-minio
    restart: unless-stopped
    env_file:
      - .env
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - ${EXPOSE_MINIO_PORT}:9000
      - ${EXPOSE_MINIO_CONSOLE_PORT}:9001
    volumes:
      - lrag_minio_data:/data
    networks:
      - lrag
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 30
    logging: *lrag-json-logging

  pgsql:
    profiles:
      - pgsql
    image: pgvector/pgvector:pg16
    container_name: lrag-pgsql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${EXPOSE_POSTGRES_PORT}:5432
    volumes:
      - lrag_pgsql_data:/var/lib/postgresql/data
    networks:
      - lrag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
    logging: *lrag-json-logging

  elasticsearch:
    profiles:
      - elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_STACK_VERSION}
    container_name: lrag-elasticsearch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - node.name=lrag-es01
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=1gb
      - cluster.routing.allocation.disk.watermark.high=512mb
      - cluster.routing.allocation.disk.watermark.flood_stage=256mb
      # 堆大小（MB），与 .env 中 ES_JAVA_HEAP_MB 一致；内存紧张时可改为 256
      - ES_JAVA_OPTS=-Xms${ES_JAVA_HEAP_MB:-512}m -Xmx${ES_JAVA_HEAP_MB:-512}m
    ports:
      - ${EXPOSE_ES_PORT}:9200
    volumes:
      - lrag_es_data:/usr/share/elasticsearch/data
    networks:
      - lrag
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    logging: *lrag-json-logging

  mongo:
    profiles:
      - mongo
    image: mongo:7
    container_name: lrag-mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - ${EXPOSE_MONGO_PORT}:27017
    volumes:
      - lrag_mongo_data:/data/db
    networks:
      - lrag
    healthcheck:
      test:
        - CMD-SHELL
        - |
          mongosh -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval 'db.adminCommand("ping").ok' | grep -q 1
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    logging: *lrag-json-logging

volumes:
  lrag_mysql_data:
  lrag_redis_data:
  lrag_minio_data:
  lrag_pgsql_data:
  lrag_es_data:
  lrag_mongo_data:

networks:
  lrag:
    driver: bridge

# LightningRAG 一体化应用（GoReleaser 镜像，内置前端）+ 中间件
# 镜像与 .goreleaser.yaml 一致：docker.io/lightningrag/lightningrag、ghcr.io/lightningrag/lightningrag
# 在 deploy/docker-compose-online 目录执行:
#   docker compose up -d
# 启用更多中间件时先编辑 .env 中 COMPOSE_PROFILES，例如:
#   COMPOSE_PROFILES=minio,elasticsearch,pgsql,mongo

include:
  - ./docker-compose-base.yaml

x-logging: &lrag-app-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  lrag-server:
    # 未提供 .env 时与 .env.example / GoReleaser 默认仓库一致
    image: ${LRAG_IMAGE:-ghcr.io/lightningrag/lightningrag:latest}
    container_name: lightningrag-server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 不可 :ro：InitDB 向导成功后会 WriteConfig 回写 mysql/jwt 等到该文件，只读挂载会报 read-only file system
      - ./config/config.compose-online.yaml:/go/src/github.com/LightningRAG/LightningRAG/server/config.docker.yaml
    ports:
      - "${LRAG_SERVER_PORT}:8888"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      network:
        ipv4_address: 177.7.0.12
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8888/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    logging: *lrag-app-logging
